name: Tests
permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", 3.11, 3.12, 3.13, 3.14]

    steps:
    - uses: actions/checkout@v7
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        uv pip install -U -r pyproject.toml --all-extras --system
    - name: Check zlib backend
      id: zlib
      shell: bash
      run: |
        zlib_info="$(python ./scripts/check_zlib.py)"
        echo "$zlib_info"
        zlib_backend="$(python -c "import json, sys; print(json.load(sys.stdin)['zlib_backend'])" <<< "$zlib_info")"
        echo "backend=$zlib_backend" >> "$GITHUB_OUTPUT"
    - name: Test with pytest
      if: steps.zlib.outputs.backend == 'zlib'
      run: |
        coverage run -m pytest && coverage report --fail-under=100
    - name: Test with pytest without zlib-only expected streams
      if: steps.zlib.outputs.backend != 'zlib'
      run: |
        python -m pytest -v -m "not requires_zlib_over_zlib_ng"
